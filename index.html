    <script>
      (function () {
        function pickLang() {
          try {
            var s = localStorage.getItem('app_lang');
            if (s === 'zh' || s === 'ko' || s === 'jp' || s === 'en') return s;
          } catch (e) {}
          var n = (navigator.language || '').toLowerCase();
          if (n.indexOf('ko') === 0) return 'ko';
          if (n.indexOf('ja') === 0) return 'jp';
          if (n.indexOf('en') === 0) return 'en';
          if (n.indexOf('zh') === 0) return 'zh';
          return 'zh';
        }
        var map = {
          zh: '/manifest.zh.json',
          ko: '/manifest.ko.json',
          jp: '/manifest.ja.json',
          en: '/manifest.en.json',
        };
        var href = map[pickLang()] || map.zh;
        var link = document.createElement('link');
        link.rel = 'manifest';
        link.href = href;
        document.head.appendChild(link);
      })();
    </script>
