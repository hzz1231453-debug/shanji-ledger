    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', 'Noto Sans KR',
          'Noto Sans JP', sans-serif;
        background: radial-gradient(circle at top, #0b1120 0, #020617 40%, #000 100%);
        color: #e5e7eb;
      }
      .page {
        min-height: 100vh;
        padding: 20px 16px 30px;
        display: flex;
        justify-content: center;
      }
      .shell {
        width: 100%;
        max-width: 440px;
        background: rgba(15, 23, 42, 0.96);
        border-radius: 26px;
        padding: 18px 16px 20px;
        box-shadow:
          0 24px 70px rgba(0, 0, 0, 0.85),
          0 0 0 1px rgba(148, 163, 184, 0.3);
        border: 1px solid rgba(251, 191, 36, 0.4);
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .logo-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 14px;
      }
      .logo-halo {
        width: 78px;
        height: 78px;
        border-radius: 999px;
        background:
          radial-gradient(circle at 30% 0%, rgba(250, 204, 21, 0.2), transparent 55%),
          radial-gradient(circle at 50% 50%, rgba(250, 204, 21, 0.6), transparent 70%);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow:
          0 0 24px rgba(250, 204, 21, 0.75),
          0 0 0 1px rgba(15, 23, 42, 0.95);
        animation: halo-breath 3s ease-in-out infinite;
      }
      .logo-halo-inner {
        width: 74%;
        height: 74%;
        border-radius: inherit;
        background: radial-gradient(circle at 30% 0%, #020617 0, #020617 45%, #000 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .logo-halo-inner img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }
      .lang-switch {
        display: flex;
        gap: 6px;
        padding: 4px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.9);
        border: 1px solid rgba(148, 163, 184, 0.7);
      }
      .lang-btn {
        border: none;
        border-radius: 999px;
        padding: 4px 9px;
        font-size: 11px;
        cursor: pointer;
        background: transparent;
        color: rgba(156, 163, 175, 0.9);
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .lang-btn[data-active='true'] {
        background: linear-gradient(120deg, #facc15, #f97316);
        color: #020617;
        font-weight: 700;
      }
      .section {
        background: radial-gradient(circle at top, rgba(30, 64, 175, 0.22), rgba(15, 23, 42, 0.98));
        border-radius: 18px;
        padding: 11px 11px 13px;
        border: 1px solid rgba(30, 64, 175, 0.6);
      }
      .section.upgrade {
        background: radial-gradient(circle at top, rgba(250, 204, 21, 0.16), rgba(15, 23, 42, 0.98));
        border-color: rgba(250, 204, 21, 0.75);
      }
      .section-header {
        margin-bottom: 8px;
      }
      .section-kicker {
        font-size: 10px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(148, 163, 184, 0.9);
      }
      .section-title {
        font-size: 15px;
        font-weight: 800;
        margin-top: 4px;
        color: #f9fafb;
      }
      .section-desc {
        font-size: 11px;
        color: rgba(209, 213, 219, 0.9);
        margin-top: 2px;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 10px;
        background: rgba(22, 163, 74, 0.2);
        color: rgba(74, 222, 128, 0.92);
        border: 1px solid rgba(34, 197, 94, 0.7);
        margin-top: 6px;
      }
      .pill-unlimited {
        background: rgba(234, 179, 8, 0.16);
        color: rgba(250, 204, 21, 0.96);
        border-color: rgba(250, 204, 21, 0.85);
      }
      .thumb-row {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
        margin-top: 9px;
      }
      .thumb {
        border-radius: 11px;
        background: radial-gradient(circle at top left, #111827, #020617);
        border: 1px solid rgba(55, 65, 81, 0.9);
        height: 52px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        color: rgba(209, 213, 219, 0.92);
        text-align: center;
        padding: 4px;
      }
      .thumb span {
        display: block;
      }
      .email-box {
        background: radial-gradient(circle at top, rgba(15, 23, 42, 0.8), rgba(2, 6, 23, 0.98));
        border-radius: 18px;
        padding: 12px 12px 13px;
        border: 1px solid rgba(55, 65, 81, 0.9);
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .email-label {
        font-size: 11px;
        color: rgba(209, 213, 219, 0.9);
      }
      .email-row {
        display: flex;
        gap: 8px;
      }
      .email-row input {
        flex: 1;
        border-radius: 999px;
        border: 1px solid rgba(75, 85, 99, 0.9);
        padding: 9px 11px;
        font-size: 12px;
        background: rgba(15, 23, 42, 0.9);
        color: #e5e7eb;
      }
      .email-row input::placeholder {
        color: rgba(148, 163, 184, 0.9);
      }
      .email-btn {
        border-radius: 999px;
        border: none;
        padding: 9px 12px;
        font-size: 11px;
        font-weight: 700;
        background: linear-gradient(120deg, #22c55e, #16a34a);
        color: #ecfdf5;
        cursor: pointer;
        white-space: nowrap;
      }
      .pwa-btn {
        margin-top: 4px;
        width: 100%;
        border-radius: 999px;
        border: 1px dashed rgba(148, 163, 184, 0.7);
        padding: 7px 10px;
        font-size: 11px;
        background: rgba(15, 23, 42, 0.9);
        color: rgba(209, 213, 219, 0.9);
        display: none;
      }
      .pwa-btn[data-visible='true'] {
        display: block;
      }
      .install-fallback-mask {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(6px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        padding: 18px;
      }
      .install-fallback-mask[data-open='true'] {
        display: flex;
      }
      .install-fallback-card {
        width: min(100%, 420px);
        border-radius: 18px;
        border: 1px solid rgba(250, 204, 21, 0.75);
        background: radial-gradient(circle at top, rgba(24, 24, 27, 0.96), rgba(15, 23, 42, 0.98));
        color: #f8fafc;
        padding: 14px 14px 12px;
        box-shadow:
          0 0 0 1px rgba(15, 23, 42, 0.9),
          0 20px 42px rgba(0, 0, 0, 0.85);
        animation: install-fallback-breath 2.6s ease-in-out infinite;
      }
      .install-fallback-title {
        font-size: 12px;
        font-weight: 800;
        color: #facc15;
        margin-bottom: 6px;
        text-align: center;
      }
      .install-fallback-body {
        font-size: 11px;
        line-height: 1.6;
        color: rgba(241, 245, 249, 0.92);
        text-align: center;
      }
      .install-fallback-close {
        margin-top: 10px;
        width: 100%;
        border: none;
        border-radius: 999px;
        padding: 8px 10px;
        font-size: 11px;
        font-weight: 700;
        background: linear-gradient(120deg, #facc15, #f97316);
        color: #111827;
        cursor: pointer;
      }
      .cta-shell {
        margin-top: 4px;
        border-radius: 999px;
        padding: 2px;
        background: radial-gradient(circle at 0 0, #facc15, rgba(249, 115, 22, 0.7));
        box-shadow:
          0 0 0 1px rgba(15, 23, 42, 0.95),
          0 0 40px rgba(250, 204, 21, 0.75);
        position: relative;
        overflow: hidden;
      }
      .cta-shell::before {
        content: '';
        position: absolute;
        inset: -40%;
        background: conic-gradient(
          from 0deg,
          rgba(250, 250, 250, 0.12),
          rgba(250, 204, 21, 0.7),
          transparent 55%,
          transparent 100%
        );
        animation: orbit 5s linear infinite;
        opacity: 0.8;
      }
      .cta-btn {
        position: relative;
        z-index: 1;
        width: 100%;
        border-radius: inherit;
        border: none;
        padding: 13px 16px;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        background: radial-gradient(circle at 30% 0%, #facc15 0, #f97316 45%, #92400e 100%);
        color: #020617;
        cursor: pointer;
        box-shadow:
          0 12px 25px rgba(0, 0, 0, 0.75),
          inset 0 1px 0 rgba(255, 248, 220, 0.85);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        animation: breath 2.4s ease-in-out infinite;
      }
      .cta-btn span.icon {
        font-size: 16px;
        transform: translateY(1px);
      }
      .cta-note {
        margin-top: 6px;
        font-size: 9px;
        color: rgba(148, 163, 184, 0.9);
        text-align: center;
      }
      @keyframes breath {
        0%,
        100% {
          transform: translateY(0);
          box-shadow:
            0 12px 25px rgba(0, 0, 0, 0.75),
            inset 0 1px 0 rgba(255, 248, 220, 0.85);
        }
        50% {
          transform: translateY(1px) scale(0.99);
          box-shadow:
            0 18px 40px rgba(250, 204, 21, 0.8),
            inset 0 1px 0 rgba(255, 253, 231, 0.96);
        }
      }
      @keyframes orbit {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      @keyframes halo-breath {
        0%,
        100% {
          box-shadow:
            0 0 22px rgba(250, 204, 21, 0.5),
            0 0 0 1px rgba(15, 23, 42, 0.95);
        }
        50% {
          box-shadow:
            0 0 34px rgba(250, 204, 21, 0.95),
            0 0 0 1px rgba(15, 23, 42, 0.9);
        }
      }
      @keyframes install-fallback-breath {
        0%,
        100% {
          transform: translateY(0);
          box-shadow:
            0 0 0 1px rgba(250, 204, 21, 0.72),
            0 16px 30px rgba(0, 0, 0, 0.86);
        }
        50% {
          transform: translateY(-1px);
          box-shadow:
            0 0 0 1px rgba(250, 204, 21, 0.95),
            0 20px 38px rgba(250, 204, 21, 0.32);
        }
      }
      @media (min-width: 640px) {
        .shell {
          padding: 20px 22px 22px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page" data-lang="zh">
      <div class="shell">
        <div class="logo-row">

        var page = document.querySelector('.page');

        function applyLang(lang) {
          var dict = strings[lang] || strings.zh;
          page.setAttribute('data-lang', lang);
          try {
            localStorage.setItem('app_lang', lang);
          } catch (e) {}
          document.title =
            lang === 'ko'
              ? '번개장부 · Flash Ledger'
              : lang === 'jp'
                ? '閃記帳簿 · Flash Ledger'
                : lang === 'en'

                  : '闪记账本';

          document.getElementById('basic-title').textContent = dict.basicTitle;
          document.getElementById('basic-desc').textContent = dict.basicDesc;
          document.getElementById('basic-pill').textContent = dict.basicPill;
          document.getElementById('basic-thumb-1').textContent = dict.basicThumb1;
          document.getElementById('basic-thumb-2').textContent = dict.basicThumb2;
          document.getElementById('basic-thumb-3').textContent = dict.basicThumb3;
          document.getElementById('basic-thumb-4').textContent = dict.basicThumb4;
          document.getElementById('email-label').textContent = dict.emailLabel;
          document.getElementById('email-btn').textContent = dict.emailBtn;
          document.getElementById('pro-kicker').textContent = dict.proKicker;
          document.getElementById('pro-title').textContent = dict.proTitle;
          document.getElementById('pro-desc').textContent = dict.proDesc;
          document.getElementById('pro-pill').textContent = dict.proPill;
          document.getElementById('pro-thumb-1').textContent = dict.proThumb1;
          document.getElementById('pro-thumb-2').textContent = dict.proThumb2;
          document.getElementById('pro-thumb-3').textContent = dict.proThumb3;
          document.getElementById('pro-thumb-4').textContent = dict.proThumb4;
          document.getElementById('pay-label').textContent = dict.payLabel;
          document.getElementById('cta-note').textContent = dict.ctaNote;
          document.getElementById('a2hs-btn').textContent = dict.pwaBtn;
          document.getElementById('install-fallback-title').textContent = dict.installFallbackTitle;
          document.getElementById('install-fallback-body').textContent = dict.installFallbackBody;
          document.getElementById('install-fallback-close').textContent = dict.installFallbackClose;
        }

        langButtons.forEach(function (btn) {
          btn.addEventListener('click', function () {
            var lang = btn.getAttribute('data-lang-code');
            langButtons.forEach(function (b) {
              b.setAttribute('data-active', b === btn ? 'true' : 'false');
            });
            applyLang(lang);
          });
        });

        var initialLang = 'zh';
        try {
          var saved = localStorage.getItem('app_lang');
          if (saved && strings[saved]) initialLang = saved;
        } catch (e) {}
        langButtons.forEach(function (b) {
          b.setAttribute('data-active', b.getAttribute('data-lang-code') === initialLang);
        });
        applyLang(initialLang);

        // PWA A2HS
        var deferredPrompt = null;
        var a2hsBtn = document.getElementById('a2hs-btn');
        var fallbackMask = document.getElementById('install-fallback-mask');
        var fallbackClose = document.getElementById('install-fallback-close');
        function openFallback() {
          fallbackMask.setAttribute('data-open', 'true');
        }
        function closeFallback() {
          fallbackMask.setAttribute('data-open', 'false');
        }
        fallbackClose.addEventListener('click', closeFallback);
        fallbackMask.addEventListener('click', function (e) {
          if (e.target === fallbackMask) closeFallback();
        });
        window.addEventListener('beforeinstallprompt', function (e) {
          e.preventDefault();
          deferredPrompt = e;
          a2hsBtn.setAttribute('data-visible', 'true');
        });
        a2hsBtn.addEventListener('click', function () {
          if (!deferredPrompt) {
            openFallback();
            return;
          }
          deferredPrompt.prompt();
          deferredPrompt.userChoice.finally(function () {
            deferredPrompt = null;
            a2hsBtn.setAttribute('data-visible', 'false');
          });
        });

        // 金色主按鈕：直接觸發系統安裝彈窗
        document.getElementById('pay-btn').addEventListener('click', function () {
          if (!deferredPrompt) {
            openFallback();
            return;
          }
          deferredPrompt.prompt();
          deferredPrompt.userChoice.finally(function () {
            deferredPrompt = null;
            a2hsBtn.setAttribute('data-visible', 'false');
          });
        });

        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('/service-worker.js').catch(function () {});
          window.addEventListener('load', function () {
            navigator.serviceWorker.register('/service-worker.js').catch(function () {});
          });
          window.setTimeout(function () {
            navigator.serviceWorker.register('/service-worker.js').catch(function () {});
          }, 10000);
        }
      })();
    </script>
  </body>
</html>
